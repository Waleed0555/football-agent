<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FootballGPT</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; }
  .header { background: #1a1a2e; padding: 16px 24px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #333; }
  .header h1 { color: #4ade80; font-size: 1.3rem; }
  .header span { color: #aaa; font-size: 0.8rem; }
  .chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  .message { max-width: 75%; padding: 12px 16px; border-radius: 16px; line-height: 1.5; font-size: 0.9rem; }
  .user { background: #4ade80; color: #000; align-self: flex-end; border-bottom-right-radius: 4px; }
  .agent { background: #1e1e2e; color: #e0e0e0; align-self: flex-start; border-bottom-left-radius: 4px; white-space: pre-wrap; }
  .typing { color: #666; font-style: italic; font-size: 0.85rem; align-self: flex-start; padding: 8px 16px; }
  .input-area { padding: 16px 20px; background: #111; border-top: 1px solid #333; display: flex; gap: 10px; }
  input { flex: 1; background: #1e1e2e; border: 1px solid #333; border-radius: 24px; padding: 12px 18px; color: #fff; font-size: 0.9rem; outline: none; }
  input:focus { border-color: #4ade80; }
  button { background: #4ade80; color: #000; border: none; border-radius: 24px; padding: 12px 24px; font-weight: bold; cursor: pointer; font-size: 0.9rem; }
  button:hover { background: #22c55e; }
  button:disabled { background: #333; color: #666; cursor: not-allowed; }
</style>
</head>
<body>
<div class="header">
  <h1>⚽ FootballGPT</h1>
  <span>Ask me anything about football — players, teams, eras</span>
</div>
<div class="chat-box" id="chatBox">
  <div class="message agent">👋 Welcome to FootballGPT! Try asking "Who was better, Pele or Maradona?" or "Compare 1999 Man Utd vs 2009 Barcelona"</div>
</div>
<div class="input-area">
  <input type="text" id="userInput" placeholder="Ask a football question..." />
  <button id="sendBtn" onclick="sendMessage()">Send</button>
</div>
<script>
  const chatBox = document.getElementById("chatBox");
  const userInput = document.getElementById("userInput");
  const sendBtn = document.getElementById("sendBtn");

  userInput.addEventListener("keypress", function(e) {
    if (e.key === "Enter") sendMessage();
  });

  function addMessage(text, role) {
    const div = document.createElement("div");
    div.className = "message " + role;
    div.textContent = text;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function addTyping() {
    const div = document.createElement("div");
    div.className = "typing";
    div.id = "typing";
    div.textContent = "FootballGPT is thinking...";
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
  }

  async function sendMessage() {
    const message = userInput.value.trim();
    if (!message) return;
    userInput.value = "";
    sendBtn.disabled = true;
    addMessage(message, "user");
    addTyping();
    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message })
      });
      const data = await res.json();
      removeTyping();
      addMessage(data.response, "agent");
    } catch (err) {
      removeTyping();
      addMessage("Something went wrong. Please try again.", "agent");
    }
    sendBtn.disabled = false;
    userInput.focus();
  }
</script>
</body>
</html>
